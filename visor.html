<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Vista protegida | JB Ediciones Digitales</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #17110d;
      color: #ffffff;

      user-select: none;
      -webkit-user-select: none;
    }

    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;

      min-height: 66px;
      padding: 11px 18px;

      background: #241711;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.35);
    }

    .brand {
      font-size: 17px;
      font-weight: 700;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 10px 15px;
      border-radius: 10px;

      background: #ffffff;
      color: #241711;

      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .notice {
      flex-shrink: 0;
      padding: 9px 15px;

      background: #34231b;
      color: #f5dfd1;

      font-size: 13px;
      text-align: center;
    }

    .viewer-container {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      background: #302a27;
    }

    #loading {
      position: absolute;
      inset: 0;
      z-index: 1;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 25px;
      background: #302a27;

      font-size: 16px;
      text-align: center;
    }

    #error {
      position: absolute;
      inset: 0;
      z-index: 3;

      display: none;
      align-items: center;
      justify-content: center;

      padding: 25px;
      background: #302a27;
      color: #ffd8d8;

      font-size: 16px;
      text-align: center;
    }

    #pdfFrame {
      position: relative;
      z-index: 2;

      display: none;
      width: 100%;
      height: 100%;

      border: 0;
      background: #ffffff;
    }

    .protection-layer {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 4;

      width: 190px;
      height: 62px;

      background: #302a27;
      pointer-events: auto;
    }

    @media print {
      html,
      body,
      .viewer-container,
      #pdfFrame {
        display: none !important;
      }
    }

    @media (max-width: 600px) {
      .topbar {
        min-height: 60px;
        padding: 9px 12px;
      }

      .brand {
        font-size: 15px;
      }

      .back-button {
        padding: 9px 12px;
        font-size: 13px;
      }

      .notice {
        padding: 8px 10px;
        font-size: 12px;
      }

      .protection-layer {
        width: 145px;
        height: 58px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="brand">
      JB Ediciones Digitales
    </div>

    <a class="back-button" href="index.html">
      ← Volver
    </a>
  </header>

  <div class="notice">
    Vista de muestra · Descarga e impresión no habilitadas
  </div>

  <main class="viewer-container">

    <div id="loading">
      Cargando muestra...
    </div>

    <div id="error">
      No se pudo abrir la muestra.
    </div>

    <iframe
      id="pdfFrame"
      title="Muestra protegida"
      loading="eager"
      referrerpolicy="same-origin"
    ></iframe>

    <div
      class="protection-layer"
      aria-hidden="true"
    ></div>

  </main>
